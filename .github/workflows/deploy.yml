name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/jose/assetto-infra
            git pull origin main
            docker compose -f docker-compose.dev.yml build telemetry-data
            docker compose -f docker-compose.dev.yml up -d telemetry-data

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.VPS_HOST }}:3000/api/health || exit 1