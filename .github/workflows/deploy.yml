name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/jose/assetto-infra
            git pull origin main
            docker compose -f docker-compose.prod.yml build telemetry-data redis
            docker compose -f docker-compose.prod.yml up -d telemetry-data redis

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.VPS_HOST }}:3000/api/health || exit 1

      - name: Verify telemetry-data container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker ps --filter name=assetto-telemetry-data --format '{{.Status}}' | grep -q Up
            docker logs assetto-telemetry-data --tail 30 2>&1 | grep -qE 'listener started|event server'