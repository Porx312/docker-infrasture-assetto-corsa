name: Deploy Dev

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Copy environment template
        run: |
          cp .env.example .env.local
          echo "REDIS_HOST=127.0.0.1" >> .env.local
          echo "REDIS_PORT=6379" >> .env.local
          echo "AC_INSTANCE_ID=vps-eu-dev" >> .env.local
          echo "SERVERS_PATH=/home/assetto/server" >> .env.local
          echo "CONVEX_DEPLOYMENT_URL=${{ secrets.CONVEX_DEPLOYMENT_URL }}" >> .env.local
          echo "CONVEX_PRODUCT_KEY=${{ secrets.CONVEX_PRODUCT_KEY }}" >> .env.local
          echo "CONVEX_WORKER_SECRET=${{ secrets.CONVEX_WORKER_SECRET }}" >> .env.local
          echo "CONVEX_INGEST_SECRET=${{ secrets.CONVEX_INGEST_SECRET }}" >> .env.local

      - name: Build and start services
        run: |
          docker compose -f docker-compose.dev.yml up -d --build

      - name: Health check
        run: |
          sleep 10
          curl -f http://localhost:3000/api/health || exit 1

      - name: Check logs
        if: failure()
        run: |
          docker logs assetto-telemetry-data --tail 20
          docker logs assetto-ac-data --tail 20